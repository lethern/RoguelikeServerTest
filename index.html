<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WebRTC Test</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			font-family: BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			font-size: 18px;
			background: #f9f9f9;
		}

		#main {
			width: 90vw;
			height: 85vh;
			position: relative;
			border: 2px solid #333;
			margin: 15px auto;
			padding: 15px;
			box-sizing: border-box;
			background: white;
			border-radius: 8px;
			overflow: hidden;
		}

		.row {
			margin-bottom: 15px;
			display: flex;
			gap: 10px;
		}

		button, input {
			font-size: 16px;
			padding: 12px 20px;
			border-radius: 6px;
			border: 1px solid #ccc;
		}

		button {
			background-color: #0070f3;
			color: white;
			border: none;
			font-weight: bold;
			cursor: pointer;
		}

		button:active {
			background-color: #0051b3;
		}

		input {
			flex-grow: 1;
		}

		#chat {
			margin-top: 15px;
			max-height: 40%;
			overflow-y: auto;
			border-top: 1px solid #eee;
			padding-top: 10px;
			font-family: monospace;
			word-break: break-word;
		}

		#remoteCursor {
			position: absolute;
			width: 14px;
			height: 14px;
			background: red;
			border-radius: 50%;
			pointer-events: none;
			transition: left 50ms linear, top 50ms linear;
			z-index: 9999;
		}
	</style>
</head>
<body>

<div id="main">
	<div class="row">
		<button id="connect">Connect</button>
	</div>

	<div class="row">
		<input id="msg" placeholder="...">
		<button id="send">Send</button>
	</div>

	<div id="chat"></div>

	<div id="remoteCursor"></div>
</div>

<script>
const ws = new WebSocket("wss://p01--roguelikeserver--by4b98kql5cr.code.run");

const pc = new RTCPeerConnection({
	iceServers: [
		{ urls: "stun:stun.l.google.com:19302" }
	]
});

let channel;

const chat = document.getElementById("chat");
const mainDiv = document.getElementById("main");

function add(text){
	chat.innerHTML += `<div>${text}</div>`;
	chat.scrollTop = chat.scrollHeight;
}

let isMaster = false;

document.getElementById("connect").onclick = async () => {
	isMaster = true;

	channel = pc.createDataChannel("cursor");
	setupChannel(channel);

	channel.onopen = () => {
		const rect = mainDiv.getBoundingClientRect();

		channel.send(JSON.stringify({
			type: "size",
			width: rect.width,
			height: rect.height
		}));
	};

	const offer = await pc.createOffer();
	await pc.setLocalDescription(offer);

	ws.send(JSON.stringify({
		type: "offer",
		offer
	}));
};

pc.ondatachannel = e => {
	channel = e.channel;
	setupChannel(channel);
};

pc.onicecandidate = e => {
	if (e.candidate) {
		ws.send(JSON.stringify({
			type: "candidate",
			candidate: e.candidate
		}));
	}
};

ws.onmessage = async ({ data }) => {

	const msg = JSON.parse(data);

	if (msg.type === "chat") {
		add("Peer: " + msg.text);
	}

	if (msg.type === "offer") {

		await pc.setRemoteDescription(msg.offer);

		const answer = await pc.createAnswer();

		await pc.setLocalDescription(answer);

		ws.send(JSON.stringify({
			type: "answer",
			answer
		}));
	}

	if (msg.type === "answer") {
		await pc.setRemoteDescription(msg.answer);
	}

	if (msg.type === "candidate") {
		try {
			await pc.addIceCandidate(msg.candidate);
		} catch {}
	}
};

document.getElementById("send").onclick = () => {

	const text = document.getElementById("msg").value;
	if(!text) return;

	ws.send(JSON.stringify({
		type: "chat",
		text
	}));

	add("Me: " + text);
	document.getElementById("msg").value = "";
};

const CURSOR_SCALE = 1000;

let targetX = 0, targetY = 0;
let posX = 0, posY = 0;
let velX = 0, velY = 0;

function setupChannel(ch){
	ch.onmessage = e => {
		if(typeof e.data ==="string"){
			const p = JSON.parse(e.data);

			if (p.type === "size") {
				mainDiv.style.width = p.width + "px";
				mainDiv.style.height = p.height + "px";
			}
		}else{
			const view = new Uint16Array(e.data);
			
			targetX = view[0] / CURSOR_SCALE * mainDiv.clientWidth;
			targetY = view[1] / CURSOR_SCALE * mainDiv.clientHeight;
			
			if(posX == 0 && posY == 0){
				posX = targetX;
				posY = targetY;
			}
		}
	};
}

function animate() {
	const stiffness = 0.65;
	const damping = 0.35;

	velX += (targetX - posX) * stiffness;
	velY += (targetY - posY) * stiffness;

	velX *= damping;
	velY *= damping;

	posX += velX;
	posY += velY;

	const remoteCursor = document.getElementById("remoteCursor");
	remoteCursor.style.left = posX + "px";
	remoteCursor.style.top = posY + "px";

	requestAnimationFrame(animate);
}
animate();

const CURSOR_FPS = 15;
let mouseX = 0;
let mouseY = 0;

let lastSentX = 0;
let lastSentY = 0;

document.addEventListener("pointermove", e => {
	const rect = mainDiv.getBoundingClientRect();

	mouseX = e.clientX - rect.left;
	mouseY = e.clientY - rect.top;
});

setInterval(sendCursor, 1000 / CURSOR_FPS);

function sendCursor() {
  if (!channel || channel.readyState !== "open") return;

	if (Math.abs(mouseX - lastSentX) < 2 && Math.abs(mouseY - lastSentY) < 2) {
		return;
	}
	
	lastSentX = mouseX;
	lastSentY = mouseY;
  
	const x = mouseX / mainDiv.clientWidth;
	const y = mouseY / mainDiv.clientHeight;

	const buf = new ArrayBuffer(4);
	const view = new Uint16Array(buf);

	view[0] = Math.round(x * CURSOR_SCALE);
	view[1] = Math.round(y * CURSOR_SCALE);

	channel.send(buf);
}
</script>

</body>
</html>
